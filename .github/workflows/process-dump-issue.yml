# Single-game catalog: each valid dump submission REPLACES the dump on the site.
name: Process dump submission

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ingest:
    if: |
      contains(github.event.issue.labels.*.name, 'dump-submission') ||
      startsWith(github.event.issue.title, 'Dump:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract attachment URL
        id: attach
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || ''
            const patterns = [
              /https:\/\/github\.com\/user-attachments\/files\/\d+\/[^\s)"']+/g,
              /https:\/\/github\.com\/[\w-]+\/[\w.-]+\/files\/\d+\/[^\s)"']+/g,
            ]
            let url = null
            for (const re of patterns) {
              const m = body.match(re)
              if (m && m.length) { url = m[0].replace(/[>\]).,]+$/, ''); break }
            }
            if (!url) {
              core.setFailed('No dump attachment found. Attach icky.dump.json to the issue.')
              return
            }
            const all = body.match(patterns[0]) || []
            const jsonish = all.find(u => /\.json($|\?)/i.test(u))
            core.setOutput('url', jsonish || url)
            core.info('Attachment: ' + (jsonish || url))

      - name: Download & validate dump
        env:
          ATTACH_URL: ${{ steps.attach.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/icky-dump
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            -L "$ATTACH_URL" -o /tmp/icky-dump/raw.bin || true
          if ! head -c 1 /tmp/icky-dump/raw.bin | grep -q '{'; then
            curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -L "$ATTACH_URL" -o /tmp/icky-dump/raw.bin
          fi
          python3 - <<'PY'
          import json, sys
          p="/tmp/icky-dump/raw.bin"
          with open(p,"rb") as f:
              data=f.read()
          if data.startswith(b"\xef\xbb\xbf"):
              data=data[3:]
          try:
              dump=json.loads(data.decode("utf-8"))
          except Exception as e:
              print("JSON parse failed:", e)
              sys.exit(1)
          if not str(dump.get("schema","")).startswith("icky.dump"):
              print("Bad schema:", dump.get("schema"))
              sys.exit(1)
          game=dump.get("game") or {}
          slug=(game.get("slug") or "").strip()
          if not slug:
              print("Missing game.slug")
              sys.exit(1)
          with open("/tmp/icky-dump/dump.json","w",encoding="utf-8") as f:
              json.dump(dump,f,indent=2)
              f.write("\n")
          with open("/tmp/icky-dump/meta.json","w",encoding="utf-8") as f:
              json.dump({
                "slug": slug,
                "game": game.get("name", slug),
                "executable": game.get("executable",""),
                "engine": (dump.get("engine") or {}).get("id","unknown"),
                "engine_label": (dump.get("engine") or {}).get("label","Unknown"),
                "mode": dump.get("mode","internal"),
                "generated_at": dump.get("generated_at",""),
                "stats": dump.get("stats") or {},
              }, f)
          print("OK slug=", slug, "types=", (dump.get("stats") or {}).get("types"))
          PY

      - name: Replace single-game catalog
        id: patch
        run: |
          set -euo pipefail
          SLUG=$(python3 -c "import json;print(json.load(open('/tmp/icky-dump/meta.json'))['slug'])")
          GAME=$(python3 -c "import json;print(json.load(open('/tmp/icky-dump/meta.json'))['game'])")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "game=$GAME" >> "$GITHUB_OUTPUT"

          # Wipe every previous dump folder — only one game lives on the site
          rm -rf web/public/dumps
          mkdir -p "web/public/dumps/$SLUG"
          cp /tmp/icky-dump/dump.json "web/public/dumps/$SLUG/dump.json"

          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone
          meta=json.load(open("/tmp/icky-dump/meta.json"))
          entry={
            "slug": meta["slug"],
            "game": meta["game"],
            "executable": meta["executable"],
            "engine": meta["engine"],
            "engine_label": meta["engine_label"],
            "mode": meta["mode"],
            "generated_at": meta["generated_at"],
            "stats": {
              "types": meta.get("stats",{}).get("types",0),
              "classes": meta.get("stats",{}).get("classes"),
              "globals": meta.get("stats",{}).get("globals",0),
              "packages": meta.get("stats",{}).get("packages"),
            },
            "path": f"dumps/{meta['slug']}/dump.json",
            "featured": True,
            "tags": [meta["engine"], meta["mode"], "current"],
          }
          cat={
            "schema": "icky.catalog/v1",
            "mode": "single-game",
            "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "dumps": [entry],  # exactly one
          }
          Path("web/public/dumps/catalog.json").write_text(
              json.dumps(cat, indent=2) + "\n", encoding="utf-8"
          )
          print("catalog set to single game:", meta["slug"])
          PY

      - name: Commit & push to main
        run: |
          set -euo pipefail
          git config user.name "icky-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A web/public/dumps
          if git diff --staged --quiet; then
            echo "No file changes"
            exit 0
          fi
          git commit -m "dump: set current game to ${{ steps.patch.outputs.slug }} (#${{ github.event.issue.number }})"
          git push origin HEAD:main

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}'
            const slug = '${{ steps.patch.outputs.slug }}'
            const game = '${{ steps.patch.outputs.game }}'
            let body
            if (outcome === 'success') {
              body = `✅ **${game || slug || 'Dump'}** is now the live dump on the site (replaces any previous game).\n\n` +
                `Catalog: https://${context.repo.owner.toLowerCase()}.github.io/${context.repo.repo}/#/dumps\n\n` +
                `Thanks @${context.payload.issue.user.login}!`
            } else {
              body = `❌ Could not update the live dump.\n\n` +
                `Attach \`icky.dump.json\` (schema \`icky.dump/v1\`) and try again.\n` +
                `Logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions`
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
            if (outcome === 'success') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                labels: ['dump-submission', 'published']
              })
            }
