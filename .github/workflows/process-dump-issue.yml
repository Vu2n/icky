# When someone opens an issue labeled dump-submission with an attached
# icky.dump.json, validate it and open a PR that updates the catalog.
name: Process dump submission

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ingest:
    if: |
      contains(github.event.issue.labels.*.name, 'dump-submission') ||
      startsWith(github.event.issue.title, 'Dump:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract attachment URL
        id: attach
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || ''
            // Matches markdown links to github user-attachments / assets
            const patterns = [
              /https:\/\/github\.com\/user-attachments\/files\/\d+\/[^\s)"']+/g,
              /https:\/\/github\.com\/[\w-]+\/[\w.-]+\/files\/\d+\/[^\s)"']+/g,
            ]
            let url = null
            for (const re of patterns) {
              const m = body.match(re)
              if (m && m.length) { url = m[0].replace(/[>\]).,]+$/, ''); break }
            }
            if (!url) {
              core.setFailed('No dump attachment found. Attach icky.dump.json to the issue.')
              return
            }
            // Prefer json-looking attachment
            const jsonish = (body.match(patterns[0]) || []).find(u => /\.json($|\?)/i.test(u))
            core.setOutput('url', jsonish || url)
            core.info('Attachment: ' + (jsonish || url))

      - name: Download dump
        env:
          ATTACH_URL: ${{ steps.attach.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/icky-dump
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            -L "$ATTACH_URL" -o /tmp/icky-dump/raw.bin
          # Some attachments are served as octet-stream without .json name
          file /tmp/icky-dump/raw.bin || true
          head -c 200 /tmp/icky-dump/raw.bin
          # Try as JSON; if HTML error page, fail
          if head -c 1 /tmp/icky-dump/raw.bin | grep -q '<'; then
            echo "Download looks like HTML — retry without Accept override"
            curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -L "$ATTACH_URL" -o /tmp/icky-dump/raw.bin
          fi
          python3 - <<'PY'
          import json, sys
          p="/tmp/icky-dump/raw.bin"
          with open(p,"rb") as f:
              data=f.read()
          # strip BOM
          if data.startswith(b"\xef\xbb\xbf"):
              data=data[3:]
          try:
              text=data.decode("utf-8")
              dump=json.loads(text)
          except Exception as e:
              print("JSON parse failed:", e)
              sys.exit(1)
          if not str(dump.get("schema","")).startswith("icky.dump"):
              print("Bad schema:", dump.get("schema"))
              sys.exit(1)
          game=dump.get("game") or {}
          slug=game.get("slug") or "unknown"
          if not slug or slug=="unknown":
              print("Missing game.slug")
              sys.exit(1)
          with open("/tmp/icky-dump/dump.json","w",encoding="utf-8") as f:
              json.dump(dump,f,indent=2)
              f.write("\n")
          with open("/tmp/icky-dump/meta.json","w",encoding="utf-8") as f:
              json.dump({
                "slug": slug,
                "game": game.get("name", slug),
                "executable": game.get("executable",""),
                "engine": (dump.get("engine") or {}).get("id","unknown"),
                "engine_label": (dump.get("engine") or {}).get("label","Unknown"),
                "mode": dump.get("mode","internal"),
                "generated_at": dump.get("generated_at",""),
                "stats": dump.get("stats") or {},
              }, f)
          print("OK slug=", slug, "types=", (dump.get("stats") or {}).get("types"))
          PY

      - name: Update catalog tree
        id: patch
        run: |
          set -euo pipefail
          SLUG=$(python3 -c "import json;print(json.load(open('/tmp/icky-dump/meta.json'))['slug'])")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          mkdir -p "web/public/dumps/$SLUG"
          cp /tmp/icky-dump/dump.json "web/public/dumps/$SLUG/dump.json"
          python3 - <<'PY'
          import json
          from pathlib import Path
          meta=json.load(open("/tmp/icky-dump/meta.json"))
          cat_path=Path("web/public/dumps/catalog.json")
          if cat_path.exists():
              cat=json.loads(cat_path.read_text(encoding="utf-8"))
          else:
              cat={"schema":"icky.catalog/v1","updated_at":"","dumps":[]}
          entry={
            "slug": meta["slug"],
            "game": meta["game"],
            "executable": meta["executable"],
            "engine": meta["engine"],
            "engine_label": meta["engine_label"],
            "mode": meta["mode"],
            "generated_at": meta["generated_at"],
            "stats": {
              "types": meta.get("stats",{}).get("types",0),
              "classes": meta.get("stats",{}).get("classes"),
              "globals": meta.get("stats",{}).get("globals",0),
              "packages": meta.get("stats",{}).get("packages"),
            },
            "path": f"dumps/{meta['slug']}/dump.json",
            "featured": False,
            "tags": [meta["engine"], meta["mode"], "community"],
          }
          dumps=cat.get("dumps") or []
          dumps=[d for d in dumps if d.get("slug")!=meta["slug"]]
          dumps.insert(0, entry)
          cat["dumps"]=dumps
          from datetime import datetime, timezone
          cat["updated_at"]=datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          cat["schema"]="icky.catalog/v1"
          cat_path.write_text(json.dumps(cat, indent=2)+"\n", encoding="utf-8")
          print("catalog entries", len(dumps))
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "dump: add ${{ steps.patch.outputs.slug }} from #${{ github.event.issue.number }}"
          title: "Dump: ${{ steps.patch.outputs.slug }}"
          body: |
            Automated ingest from community issue #${{ github.event.issue.number }}.

            - Game slug: `${{ steps.patch.outputs.slug }}`
            - Submitted by: @${{ github.event.issue.user.login }}

            Please review offsets before merge.
          branch: dump/${{ steps.patch.outputs.slug }}-${{ github.event.issue.number }}
          labels: dump-submission
          add-paths: |
            web/public/dumps/**

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}'
            let body
            if (outcome === 'success') {
              body = `✅ Dump validated and a pull request was opened to add it to the catalog.\n\nThanks @${context.payload.issue.user.login}!`
            } else {
              body = `❌ Could not ingest this dump automatically.\n\nCommon fixes:\n- Attach \`icky.dump.json\` (schema \`icky.dump/v1\`) directly to the issue\n- Re-dump with a recent Icky build\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions) for logs.`
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
