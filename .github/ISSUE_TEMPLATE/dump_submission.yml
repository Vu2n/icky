name: Submit game dump
description: Share an Icky icky.dump.json so it can be added to the public catalog
title: "Dump: "
labels:
  - dump-submission
body:
  - type: markdown
    attributes:
      value: |
        ## How to submit (easy)

        1. Run **Icky** → open the site **Upload** page and drop `icky.dump.json`
        2. Click **Download for GitHub** (for large games this is **slim + .gz** — GitHub issues max ~25 MB)
        3. **Drag that downloaded file into this issue** and submit

        Full Rust dumps are often 100–250 MB raw — **do not** attach the full file; use slim/gz from the site.

        Same `game.slug` **updates** the catalog entry.
  - type: input
    id: game
    attributes:
      label: Game name
      placeholder: AVF2
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options:
        - unreal
        - il2cpp
        - mono
        - source1
        - source2
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Game / build version (optional)
      placeholder: "1.2.3 / CL 123456"
  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      placeholder: Patch notes, offsets that changed, etc.
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I attached icky.dump.json or icky.dump.json.gz (under ~25 MB) to this issue
          required: true
        - label: This dump is from software I am allowed to reverse / dump
          required: true
